apiVersion: 1

datasources:
  - name: InfluxDB-Minibaja
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: MadRams
      defaultBucket: Telemetry
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUX_TOKEN}
    isDefault: true
    editable: true
